<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swig Page</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Taylor Anderson</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container text-center mt-5">

  <!-- TITLE -->
  <h1>Swig Drinks</h1>
  <p class="mb-4">Some of my favorite drinks and why I love Swig</p>

  <!-- IMAGE -->
  <div class="section">
    <img src="SwigLogo.png" alt="Swig Logo" width="200">
  </div>

  <!-- FAVORITES -->
  <div class="section">
    <h2>Favorite Drinks</h2>
    <ul>
      <li>Dirty Dr Pepper</li>
      <li>Raspberry Dream</li>
      <li>Cherry Bomb</li>
      <li>Hula Girl</li>
    </ul>
  </div>

  <!-- VIDEO -->
  <div class="section">
    <h2>Swig Video</h2>
    <iframe 
      width="100%" 
      height="400"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      title="Swig Video"
      allowfullscreen>
    </iframe>
  </div>

  <!-- TABLEAU -->
  <div class="section">
    <h2>Soda Consumption Visualization</h2>
    <iframe 
      src="https://public.tableau.com/views/Sodaconsumption/Sodaconsumption?:embed=y&:display_count=yes" 
      width="100%" 
      height="600">
    </iframe>
  </div>

  <!-- NAV BUTTONS -->
  <div class="mt-4">
    <a href="app.html" class="btn btn-primary me-2">Drink Picker</a>
    <a href="index.html" class="btn btn-outline-dark">Resume</a>
  </div>

</div>

</body>
</html>
