<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink Picker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Taylor Anderson</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container text-center mt-5">

    <img src="./SwigLogo.png" alt="Swig Logo" width="180" class="mb-3">

    <h1>Pick Your Drink</h1>
    <p>Click below to get a random drink suggestion</p>

    <!-- BUTTON -->
    <button class="btn btn-primary mt-2" onclick="pickDrink()">Pick a Drink</button>

    <!-- RESULT -->
    <p id="result" class="mt-3"></p>

    <!-- NAV LINKS -->
    <div class="mt-4">
        <a href="scratch.html" class="btn btn-outline-dark me-2">Swig Page</a>
        <a href="index.html" class="btn btn-outline-dark">Resume</a>
    </div>

</div>

<!-- SCRIPT -->
<script>
function pickDrink() {
  let drinks = [
    "Dirty Dr Pepper",
    "Raspberry Dream",
    "Super Trooper",
    "Strawberry Breeze",
    "Cherry Bomb",
    "Hula Girl"
  ];

  let random = Math.floor(Math.random() * drinks.length);

  document.getElementById("result").innerText = drinks[random];
}
</script>

</body>
</html>
